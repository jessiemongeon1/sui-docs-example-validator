name: Validate Docs Examples

on:
  schedule:
    - cron: '0 6 * * 1' # Weekly on Monday at 6am UTC
  workflow_dispatch:
    inputs:
      sui_branch:
        description: 'Sui repo branch to validate against'
        default: 'main'

env:
  SUI_BRANCH: ${{ github.event.inputs.sui_branch || 'main' }}

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install suiup
        run: curl -fsSL https://raw.githubusercontent.com/MystenLabs/suiup/main/install.sh | bash

      - name: Install Sui CLI and MVR via suiup
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          suiup install sui -y
          suiup install mvr -y
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - uses: dtolnay/rust-toolchain@stable

      - name: Install pnpm and bun
        run: |
          npm install -g pnpm
          npm install -g bun

      - name: Install project dependencies
        run: npm ci

      - name: Print tool versions
        run: |
          echo "=== Tool Versions ==="
          sui --version || echo "sui not found"
          node --version
          npm --version
          pnpm --version
          bun --version || echo "bun not found"
          rustc --version
          cargo --version

      - name: Clone sui repo (shallow)
        run: |
          git clone --depth 1 --branch ${{ env.SUI_BRANCH }} \
            https://github.com/MystenLabs/sui.git /tmp/sui

      - name: Discover examples
        run: npx tsx scripts/discover.ts --sui-repo /tmp/sui --output manifest/

      - name: Validate all examples
        run: |
          npx tsx scripts/validate-all.ts \
            --sui-repo /tmp/sui \
            --manifest manifest/packages.json \
            --output results/report.md
        continue-on-error: true

      - name: Post job summary
        if: always()
        run: |
          if [ -f results/report.md ]; then
            cat results/report.md >> $GITHUB_STEP_SUMMARY
          else
            echo "## Validation did not produce a report" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload report artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: validation-results
          path: |
            results/
            manifest/

      - name: Commit report to repo
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          mkdir -p reports
          cp results/report.md "reports/report-$(date -u +%Y-%m-%d).md" 2>/dev/null || true
          cp results/report.md reports/latest.md 2>/dev/null || true
          cp results/report.json reports/latest.json 2>/dev/null || true
          git add reports/
          git diff --cached --quiet || git commit -m "report: validation run $(date -u +%Y-%m-%d)"
          git push
