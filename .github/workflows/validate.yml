name: Validate Docs Examples

on:
  schedule:
    - cron: '0 6 * * 1' # Weekly on Monday at 6am UTC
  workflow_dispatch:
    inputs:
      sui_branch:
        description: 'Sui repo branch to validate against'
        default: 'main'
      mode:
        description: 'Validation mode'
        type: choice
        options:
          - strict
          - compat
        default: 'strict'
  workflow_call:
    inputs:
      sui_ref:
        description: 'Sui repo ref (branch, tag, or SHA) to validate against'
        type: string
        required: true
      mode:
        description: 'Validation mode (strict or compat)'
        type: string
        default: 'strict'

env:
  SUI_REF: ${{ inputs.sui_ref || github.event.inputs.sui_branch || 'main' }}
  MODE: ${{ inputs.mode || github.event.inputs.mode || 'strict' }}

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install suiup
        run: curl -fsSL https://raw.githubusercontent.com/MystenLabs/suiup/main/install.sh | bash

      - name: Install Sui CLI and MVR via suiup
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          suiup install sui -y
          suiup install mvr -y
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - uses: dtolnay/rust-toolchain@stable

      - name: Install pnpm and bun
        run: |
          npm install -g pnpm
          npm install -g bun

      - name: Install project dependencies
        run: npm ci

      - name: Clone sui repo
        run: |
          git clone --depth 1 https://github.com/MystenLabs/sui.git /tmp/sui
          cd /tmp/sui
          git fetch origin "${{ env.SUI_REF }}" --depth=1 || true
          git checkout "${{ env.SUI_REF }}" || git checkout FETCH_HEAD

      - name: Discover examples
        run: npx tsx scripts/discover.ts --sui-repo /tmp/sui --output manifest/

      - name: Validate all examples
        run: |
          npx tsx scripts/validate-all.ts \
            --sui-repo /tmp/sui \
            --manifest manifest/packages.json \
            --output results/report.md \
            --mode ${{ env.MODE }}

      - name: Post job summary
        if: always()
        run: |
          if [ -f results/report.md ]; then
            cat results/report.md >> $GITHUB_STEP_SUMMARY
          else
            echo "## Validation did not produce a report" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: validation-results
          path: |
            results/
            manifest/

  save-report:
    needs: validate
    if: always() && github.event_name != 'workflow_call'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download results
        uses: actions/download-artifact@v4
        with:
          name: validation-results
          path: results/

      - name: Commit report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          mkdir -p reports
          cp results/report.md "reports/report-$(date -u +%Y-%m-%d).md" 2>/dev/null || true
          cp results/report.md reports/latest.md 2>/dev/null || true
          cp results/report.json reports/latest.json 2>/dev/null || true
          git add reports/
          git diff --cached --quiet || git commit -m "report: validation run $(date -u +%Y-%m-%d)"
          git push
